<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoAdvance — Compras Públicas · CGU</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:      #1351B4;
    --blue-dark: #071D41;
    --blue-mid:  #0C326F;
    --green:     #168821;
    --yellow:    #FFCD07;
    --yellow-dk: #A07800;
    --gray-bg:   #F0F2F5;
    --gray-10:   #E6E8EC;
    --gray-20:   #C8CDD6;
    --gray-50:   #8A9099;
    --gray-70:   #4A5057;
    --gray-90:   #1A1D21;
    --white:     #FFFFFF;
    --font: 'Raleway', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background: var(--gray-bg);
    color: var(--gray-90);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .panel-header {
    background: var(--blue-dark);
    padding: 0 2.5rem;
    display: flex;
    align-items: stretch;
    min-height: 72px;
  }

  .tricolor {
    width: 8px;
    flex-shrink: 0;
    background: linear-gradient(to bottom,
      var(--yellow) 0%, var(--yellow) 33.3%,
      var(--green)  33.3%, var(--green)  66.6%,
      var(--blue)   66.6%, var(--blue)   100%
    );
    margin: 14px 20px 14px 0;
    border-radius: 2px;
  }

  .panel-header-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 14px 0;
  }

  .panel-orgao {
    font-size: 0.68rem;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .panel-title {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .panel-subtitle {
    font-size: 0.75rem;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-top: 3px;
  }

  .panel-header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .badge {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .accent-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--yellow) 0%, var(--green) 40%, var(--blue) 100%);
  }

  .layout {
    max-width: 1440px;
    margin: 0 auto;
    padding: 1.8rem 2rem 3rem;
  }

  #loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--blue);
    font-size: 0.85rem;
    font-weight: 600;
    padding: 3rem 0;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--gray-10);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CARDS ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 1.4rem;
  }

  .card {
    background: var(--white);
    border-radius: 6px;
    padding: 1.1rem 1.3rem 1.2rem;
    border-left: 4px solid var(--blue);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .card.green  { border-left-color: var(--green); }
  .card.yellow { border-left-color: var(--yellow); }

  .card-label {
    font-size: 0.67rem;
    font-weight: 700;
    color: var(--gray-50);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .card-value {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--blue-dark);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .card.green  .card-value { color: var(--green); }
  .card.yellow .card-value { color: var(--yellow-dk); }

  /* ── PANEL / TABLE ── */
  .panel {
    background: var(--white);
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    overflow: hidden;
    border: 1px solid var(--gray-10);
  }

  .table-wrap {
    max-height: 65vh;
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    table-layout: auto;
  }

  thead th {
    background: #EEF2FA;
    color: var(--blue-mid);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.64rem;
    letter-spacing: 0.07em;
    padding: 0.65rem 0.9rem;
    text-align: left;
    border-bottom: 2px solid #C5D4F0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  thead th:hover { background: #DDE6F7; color: var(--blue); }
  thead th.sorted { color: var(--blue); background: #D4E1F7; }

  tbody tr { animation: rowIn 0.2s ease both; }

  @keyframes rowIn {
    from { opacity:0; transform:translateX(-4px); }
    to   { opacity:1; transform:translateX(0); }
  }

  tbody td {
    padding: 0.5rem 0.9rem;
    border-bottom: 1px solid var(--gray-10);
    vertical-align: top;
    color: var(--gray-90);
  }

  tbody tr:hover { background: #F5F8FF; }
  tbody tr:last-child td { border-bottom: none; }

  .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="panel-header">
  <div class="tricolor"></div>
  <div class="panel-header-text">
    <div class="panel-orgao">CGU · Controladoria-Geral da União</div>
    <div class="panel-title">EcoAdvance — Compras Públicas por Produto</div>
    <div class="panel-subtitle">Notas Fiscais Eletrônicas do Executivo Federal · 2024–2025</div>
  </div>
  <div class="panel-header-right">
    <span class="badge">Portal da Transparência · CGU</span>
    <span class="badge">EcoAdvance</span>
  </div>
</div>
<div class="accent-bar"></div>

<div class="layout">
  <div id="loading"><div class="spinner"></div>Carregando dados…</div>
  <div id="app" style="display:none">
    <div class="cards" id="cards"></div>
    <div class="panel">
      <div class="table-wrap">
        <table id="tbl"><thead></thead><tbody></tbody></table>
      </div>
    </div>
  </div>
</div>

<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/+esm';

(async () => {
  const bundle = await duckdb.selectBundle(duckdb.getJsDelivrBundles());
  const workerUrl = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
  );
  const worker = new Worker(workerUrl);
  const db = new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(), worker);
  await db.instantiate(bundle.mainModule);
  URL.revokeObjectURL(workerUrl);
  const conn = await db.connect();

  async function registerParquet(file) {
    const resp = await fetch(file);
    const buf = new Uint8Array(await resp.arrayBuffer());
    await db.registerFileBuffer(file, buf);
  }

  await registerParquet('resumo_ecoadvance.parquet');

  const fmt  = v => v == null ? '—' : Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
  const fmtN = v => v == null ? '—' : Number(v).toLocaleString('pt-BR');

  // ── Cards ──
  const totais = (await conn.query(`
    SELECT
      SUM(valor_2025)::DOUBLE           AS valor_total_2025,
      SUM(qtd_emitentes_2025)::DOUBLE   AS emitentes_2025,
      SUM(qtd_notas_fiscais_2025)::DOUBLE AS notas_2025
    FROM 'resumo_ecoadvance.parquet'
  `)).toArray()[0];

  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="card-label">Valor Total (2025)</div>
      <div class="card-value">${fmt(totais.valor_total_2025)}</div>
    </div>
    <div class="card green">
      <div class="card-label">Fornecedores Distintos (2025)</div>
      <div class="card-value">${fmtN(totais.emitentes_2025)}</div>
    </div>
    <div class="card yellow">
      <div class="card-label">Notas Fiscais (2025)</div>
      <div class="card-value">${fmtN(totais.notas_2025)}</div>
    </div>
  `;

  // ── Table ──
  const rows = (await conn.query(
    "SELECT * FROM 'resumo_ecoadvance.parquet' ORDER BY valor_2025 DESC"
  )).toArray();

  const cols = [
    { key: 'ecoadvance_produto_pespp', label: 'Produto PESPP' },
    { key: 'ecoadvance_pe',            label: 'PE' },
    { key: 'valor_2024',               label: 'Valor 2024',        numeric: true, fmt },
    { key: 'valor_2025',               label: 'Valor 2025',        numeric: true, fmt },
    { key: 'qtd_emitentes_2024',       label: 'Fornecedores 2024', numeric: true, fmt: fmtN },
    { key: 'qtd_emitentes_2025',       label: 'Fornecedores 2025', numeric: true, fmt: fmtN },
    { key: 'qtd_notas_fiscais_2024',   label: 'Notas Fiscais 2024', numeric: true, fmt: fmtN },
    { key: 'qtd_notas_fiscais_2025',   label: 'Notas Fiscais 2025', numeric: true, fmt: fmtN },
  ];

  const tableEl = document.getElementById('tbl');
  const thead = tableEl.querySelector('thead');
  const tbody = tableEl.querySelector('tbody');
  let sortIdx = null, sortAsc = true;
  let currentRows = [...rows];

  function renderBody(data) {
    tbody.innerHTML = data.map(r =>
      '<tr>' + cols.map(c => {
        const v = r[c.key];
        const cls = c.numeric ? ' class="num"' : '';
        const display = c.fmt ? c.fmt(v) : (v ?? '—');
        return `<td${cls}>${display}</td>`;
      }).join('') + '</tr>'
    ).join('');
  }

  function renderHead() {
    thead.innerHTML = '<tr>' + cols.map((c, i) => {
      const active = i === sortIdx;
      const arrow  = active ? (sortAsc ? ' ▲' : ' ▼') : '';
      return `<th data-i="${i}"${active ? ' class="sorted"' : ''}>${c.label}${arrow}</th>`;
    }).join('') + '</tr>';
    thead.querySelectorAll('th').forEach(th => {
      th.addEventListener('click', () => {
        const i = +th.dataset.i;
        sortAsc = sortIdx === i ? !sortAsc : true;
        sortIdx = i;
        const col = cols[sortIdx];
        currentRows = [...rows].sort((a, b) => {
          const va = a[col.key], vb = b[col.key];
          if (va == null && vb == null) return 0;
          if (va == null) return sortAsc ? 1 : -1;
          if (vb == null) return sortAsc ? -1 : 1;
          if (col.numeric) return sortAsc ? Number(va) - Number(vb) : Number(vb) - Number(va);
          return sortAsc
            ? String(va).localeCompare(String(vb), 'pt-BR')
            : String(vb).localeCompare(String(va), 'pt-BR');
        });
        renderHead();
        renderBody(currentRows);
      });
    });
  }

  renderHead();
  renderBody(currentRows);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = '';
})().catch(err => {
  document.getElementById('loading').innerHTML = `<span style="color:#C53030">Erro ao carregar: ${err.message}</span>`;
});
</script>
</body>
</html>
