<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compras Públicas — Cadeias NIB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #22263a;
    --border: #2a2e3f;
    --text: #e2e4ea;
    --text-muted: #8b8fa3;
    --accent: #4f8ff7;
    --accent-dim: #2a4a8a;
    --green: #34d399;
    --yellow: #fbbf24;
    --font-body: 'Source Sans 3', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.6;
    padding: 2rem;
  }

  h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }

  #loading {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 0.9rem;
    padding: 2rem 0;
  }

  .controls {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  select, input[type="text"] {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 0.9rem;
    min-width: 220px;
  }

  select:focus, input:focus { outline: none; border-color: var(--accent); }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
  }

  .card-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
  }

  .card-value {
    font-size: 1.5rem;
    font-weight: 700;
    font-family: var(--font-mono);
  }

  .card-value.accent { color: var(--accent); }
  .card-value.green  { color: var(--green); }
  .card-value.yellow { color: var(--yellow); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    table-layout: auto;
  }

  thead th {
    background: var(--surface);
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    padding: 0.7rem 0.8rem;
    text-align: left;
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  thead th:hover { color: var(--accent); }

  tbody td {
    padding: 0.55rem 0.8rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  tbody tr:hover { background: var(--surface-hover); }
  tbody tr.clickable { cursor: pointer; }

  .num { text-align: right; font-family: var(--font-mono); font-size: 0.8rem; }

  .table-wrap {
    max-height: 65vh;
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid var(--border);
  }

  .tab {
    padding: 0.6rem 1.4rem;
    cursor: pointer;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.85rem;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .hidden { display: none; }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .overlay.visible { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.8rem;
    max-width: 640px;
    width: 90%;
    position: relative;
  }

  .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; }
  .modal-sub   { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.2rem; }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1.2rem;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1.2rem;
  }

  .modal-close:hover { color: var(--text); }
</style>
</head>
<body>

<h1>Compras Públicas — Cadeias NIB</h1>
<p class="subtitle">Histórico 2024–2025 · Notas Fiscais Eletrônicas do Executivo Federal · Fonte: Portal da Transparência (CGU)</p>

<div id="loading">Carregando DuckDB-WASM e dados…</div>

<div id="app" class="hidden">
  <div class="controls">
    <select id="selCadeia"><option value="">Todas as cadeias</option></select>
  </div>

  <div class="cards" id="cards"></div>

  <div class="tabs">
    <div class="tab active" data-tab="cnae">Por CNAE</div>
    <div class="tab" data-tab="resumo">Resumo por Cadeia</div>
    <div class="tab" data-tab="detalhado">Detalhado</div>
  </div>

  <div id="tab-cnae">
    <div class="table-wrap"><table id="tblCnae"><thead></thead><tbody></tbody></table></div>
  </div>

  <div id="tab-resumo" class="hidden">
    <div class="table-wrap"><table id="tblResumo"><thead></thead><tbody></tbody></table></div>
  </div>

  <div id="tab-detalhado" class="hidden">
    <div class="table-wrap"><table id="tblDetalhe"><thead></thead><tbody></tbody></table></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-close" id="modalClose">✕</div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub"   id="modalSub"></div>
  </div>
</div>

<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/+esm';

const TABELA_NIB = 'cnae_cadeia.parquet';

(async () => {
  const bundle = await duckdb.selectBundle(duckdb.getJsDelivrBundles());
  const workerUrl = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
  );
  const logger = new duckdb.ConsoleLogger();
  const worker = new Worker(workerUrl);
  const db = new duckdb.AsyncDuckDB(logger, worker);
  await db.instantiate(bundle.mainModule);
  URL.revokeObjectURL(workerUrl);
  const conn = await db.connect();

  async function registerParquet(file) {
    const resp = await fetch(file);
    const buf = new Uint8Array(await resp.arrayBuffer());
    await db.registerFileBuffer(file, buf);
  }

  await registerParquet('resumo_cadeia.parquet');
  await registerParquet('detalhado_cadeia.parquet');
  await registerParquet('totais_globais.parquet');
  await registerParquet(TABELA_NIB);

  const fmt  = v => v == null ? '—' : Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
  const fmtN = v => v == null ? '—' : Number(v).toLocaleString('pt-BR');

  function buildTable(tableEl, rows, cols, onRowClick) {
    const thead = tableEl.querySelector('thead');
    const tbody = tableEl.querySelector('tbody');
    thead.innerHTML = '<tr>' + cols.map(c => `<th>${c.label}</th>`).join('') + '</tr>';
    tbody.innerHTML = rows.map((r, i) =>
      `<tr${onRowClick ? ' class="clickable"' : ''} data-idx="${i}">` +
      cols.map(c => {
        const v = r[c.key];
        const cls = c.numeric ? ' class="num"' : '';
        const display = c.fmt ? c.fmt(v) : (v ?? '—');
        return `<td${cls}>${display}</td>`;
      }).join('') + '</tr>'
    ).join('');
    if (onRowClick) {
      tbody.querySelectorAll('tr').forEach(tr => {
        tr.addEventListener('click', () => onRowClick(rows[+tr.dataset.idx]));
      });
    }
  }

  const overlay    = document.getElementById('overlay');
  const modalTitle = document.getElementById('modalTitle');
  const modalSub   = document.getElementById('modalSub');

  document.getElementById('modalClose').addEventListener('click', () => overlay.classList.remove('visible'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('visible'); });

  // Select cadeias
  const cadeias = (await conn.query(
    "SELECT DISTINCT codigo_cadeia || ' — ' || cadeia AS label, codigo_cadeia AS value FROM 'resumo_cadeia.parquet' ORDER BY codigo_cadeia"
  )).toArray();
  const sel = document.getElementById('selCadeia');
  cadeias.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.value;
    opt.textContent = r.label;
    sel.appendChild(opt);
  });

  async function refresh() {
    const cadeia = sel.value;
    const wBase  = cadeia ? `WHERE codigo_cadeia = '${cadeia}'` : '';
    const wNib   = cadeia ? `WHERE "Código da Cadeia" = '${cadeia}'` : '';

    // Cards — sem filtro usa totais_globais (sem dupla contagem entre cadeias)
    //         com filtro usa resumo_cadeia (correto pois SELECT DISTINCT deduplica dentro da cadeia)
    let total, fornecedores, itens, ncadeias;
    if (!cadeia) {
      const g = (await conn.query(`
        SELECT
          valor_total_global::DOUBLE  AS total,
          fornecedores_global::DOUBLE AS fornecedores,
          itens_global::DOUBLE        AS itens
        FROM 'totais_globais.parquet'
      `)).toArray()[0];
      const nc = (await conn.query(
        "SELECT COUNT(*)::DOUBLE AS n FROM 'resumo_cadeia.parquet'"
      )).toArray()[0];
      total = g.total; fornecedores = g.fornecedores; itens = g.itens; ncadeias = nc.n;
    } else {
      const s = (await conn.query(`
        SELECT
          COALESCE(SUM(valor_total_adquirido), 0)::DOUBLE  AS total,
          COALESCE(SUM(fornecedores_distintos), 0)::DOUBLE AS fornecedores,
          COALESCE(SUM(quantidade_itens), 0)::DOUBLE       AS itens,
          COUNT(*)::DOUBLE                                 AS ncadeias
        FROM 'resumo_cadeia.parquet' ${wBase}
      `)).toArray()[0];
      total = s.total; fornecedores = s.fornecedores; itens = s.itens; ncadeias = s.ncadeias;
    }

    document.getElementById('cards').innerHTML = `
      <div class="card"><div class="card-label">Valor Total (2024–2025)</div><div class="card-value accent">${fmt(total)}</div></div>
      <div class="card"><div class="card-label">Fornecedores</div><div class="card-value green">${fmtN(fornecedores)}</div></div>
      <div class="card"><div class="card-label">Itens de NF-e</div><div class="card-value yellow">${fmtN(itens)}</div></div>
      <div class="card"><div class="card-label">Cadeias NIB</div><div class="card-value">${fmtN(ncadeias)}</div></div>
    `;

    // Por CNAE — aba principal
    const cnaeRows = (await conn.query(
      `SELECT * FROM '${TABELA_NIB}' ${wNib} ORDER BY "Código da Cadeia", "Valor Total" DESC`
    )).toArray();
    buildTable(document.getElementById('tblCnae'), cnaeRows, [
      { key: 'Número da Missão',       label: 'Missão' },
      { key: 'Código da Cadeia',       label: 'Código' },
      { key: 'Cadeia Prioritária',     label: 'Cadeia' },
      { key: 'CNAE',                   label: 'CNAE' },
      { key: 'Descrição da CNAE',      label: 'Descrição CNAE' },
      { key: 'Critério',               label: 'Critério' },
      { key: 'Missões',                label: 'Missões' },
      { key: 'ICP',                    label: 'ICP', numeric: true },
      { key: 'Seção CNAE',             label: 'Seção CNAE' },
      { key: 'SH Correspondente',      label: 'SH Correspondente' },
      { key: 'Valor Total',            label: 'Valor Total',   numeric: true, fmt },
      { key: 'Número de Fornecedores', label: 'Fornecedores',  numeric: true, fmt: fmtN },
      { key: 'Número de Notas Fiscais',label: 'NFs',           numeric: true, fmt: fmtN },
      { key: 'Número de Itens',        label: 'Itens',         numeric: true, fmt: fmtN },
    ]);

    // Resumo por cadeia
    const resumoRows = (await conn.query(
      `SELECT * FROM 'resumo_cadeia.parquet' ${wBase} ORDER BY valor_total_adquirido DESC`
    )).toArray();
    buildTable(document.getElementById('tblResumo'), resumoRows, [
      { key: 'missao',                 label: 'Missão' },
      { key: 'codigo_cadeia',          label: 'Código' },
      { key: 'cadeia',                 label: 'Cadeia' },
      { key: 'valor_total_adquirido',  label: 'Valor Total',  numeric: true, fmt },
      { key: 'fornecedores_distintos', label: 'Fornecedores', numeric: true, fmt: fmtN },
      { key: 'quantidade_itens',       label: 'Itens',        numeric: true, fmt: fmtN },
    ]);

    // Detalhado
    const detalheRows = (await conn.query(
      `SELECT * FROM 'detalhado_cadeia.parquet' ${wBase} ORDER BY valor_total DESC LIMIT 500`
    )).toArray();
    buildTable(document.getElementById('tblDetalhe'), detalheRows, [
      { key: 'codigo_cadeia',                label: 'Código' },
      { key: 'cadeia',                       label: 'Cadeia' },
      { key: 'cnae',                         label: 'CNAE' },
      { key: 'criterio',                     label: 'Critério' },
      { key: 'icp',                          label: 'ICP',        numeric: true },
      { key: 'codigo_ncm_sh',                label: 'NCM/SH',     numeric: true },
      { key: 'descricao_do_produto_servico',  label: 'Descrição' },
      { key: 'valor_total',                  label: 'Valor Total',  numeric: true, fmt },
      { key: 'fornecedores_distintos',        label: 'Fornecedores', numeric: true, fmt: fmtN },
      { key: 'quantidade_total',             label: 'Quantidade',   numeric: true, fmt: fmtN },
    ]);
  }

  sel.addEventListener('change', refresh);

  // Tabs
  const tabIds = { cnae: 'tab-cnae', resumo: 'tab-resumo', detalhado: 'tab-detalhado' };
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      Object.entries(tabIds).forEach(([key, id]) => {
        document.getElementById(id).classList.toggle('hidden', tab.dataset.tab !== key);
      });
    });
  });

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  await refresh();
})();
</script>
</body>
</html>
