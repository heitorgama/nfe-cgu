<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compras Públicas — Grupo A &amp; B</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #22263a;
    --border: #2a2e3f;
    --text: #e2e4ea;
    --text-muted: #8b8fa3;
    --accent: #4f8ff7;
    --accent-dim: #2a4a8a;
    --green: #34d399;
    --yellow: #fbbf24;
    --purple: #a78bfa;
    --font-body: 'Source Sans 3', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.6;
    padding: 2rem;
  }

  h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }

  #loading {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 0.9rem;
    padding: 2rem 0;
  }

  .controls {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  select, input[type="text"] {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 0.9rem;
    min-width: 220px;
  }

  select:focus, input:focus { outline: none; border-color: var(--accent); }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
  }

  .card-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
  }

  .card-value {
    font-size: 1.5rem;
    font-weight: 700;
    font-family: var(--font-mono);
  }

  .card-value.accent { color: var(--accent); }
  .card-value.green  { color: var(--green); }
  .card-value.yellow { color: var(--yellow); }
  .card-value.purple { color: var(--purple); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    table-layout: auto;
  }

  thead th {
    background: var(--surface);
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    padding: 0.7rem 0.8rem;
    text-align: left;
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  thead th:hover { color: var(--accent); }

  tbody td {
    padding: 0.55rem 0.8rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  tbody tr:hover { background: var(--surface-hover); }

  .num { text-align: right; font-family: var(--font-mono); font-size: 0.8rem; }

  .table-wrap {
    max-height: 65vh;
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .group-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid var(--border);
  }

  .group-tab {
    padding: 0.6rem 1.8rem;
    cursor: pointer;
    color: var(--text-muted);
    font-weight: 700;
    font-size: 0.9rem;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .group-tab:hover { color: var(--text); }
  .group-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .group-panel { display: none; }
  .group-panel.active { display: block; }

  .hidden { display: none; }
</style>
</head>
<body>

<h1>Compras Públicas — Grupo A &amp; B</h1>
<p class="subtitle">Histórico 2022–2025 · Notas Fiscais Eletrônicas do Executivo Federal · Fonte: Portal da Transparência (CGU)</p>

<div id="loading">Carregando DuckDB-WASM e dados…</div>

<div id="app" class="hidden">

  <div class="group-tabs">
    <div class="group-tab active" data-group="a">Grupo A — Por Tipo</div>
    <div class="group-tab"        data-group="b">Grupo B — Por Palavras-chave</div>
  </div>

  <!-- GRUPO A -->
  <div class="group-panel active" id="panel-a">
    <div class="controls">
      <select id="selTipo"><option value="">Todos os tipos</option></select>
      <select id="selAnoA"><option value="">Todos os anos</option></select>
    </div>
    <div class="cards" id="cardsA"></div>
    <div class="table-wrap">
      <table id="tblA"><thead></thead><tbody></tbody></table>
    </div>
  </div>

  <!-- GRUPO B -->
  <div class="group-panel" id="panel-b">
    <div class="controls">
      <select id="selAnoB"><option value="">Todos os anos</option></select>
    </div>
    <div class="cards" id="cardsB"></div>
    <div class="table-wrap">
      <table id="tblB"><thead></thead><tbody></tbody></table>
    </div>
  </div>

</div>

<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/+esm';

(async () => {
  const bundle = await duckdb.selectBundle(duckdb.getJsDelivrBundles());
  const workerUrl = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
  );
  const logger = new duckdb.ConsoleLogger();
  const worker = new Worker(workerUrl);
  const db = new duckdb.AsyncDuckDB(logger, worker);
  await db.instantiate(bundle.mainModule);
  URL.revokeObjectURL(workerUrl);
  const conn = await db.connect();

  async function registerParquet(file) {
    const resp = await fetch(file);
    const buf = new Uint8Array(await resp.arrayBuffer());
    await db.registerFileBuffer(file, buf);
  }

  await registerParquet('resumo_grupo_a.parquet');
  await registerParquet('resumo_grupo_b.parquet');

  // ── Formatters ──
  const fmt  = v => (v == null || v === '') ? '' : Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
  const fmtN = v => (v == null || v === '') ? '' : Number(v).toLocaleString('pt-BR');
  const fmtS = v => v ?? '';

  // ── Generic table builder ──
  function buildTable(tableEl, rows, cols) {
    const thead = tableEl.querySelector('thead');
    const tbody = tableEl.querySelector('tbody');
    thead.innerHTML = '<tr>' + cols.map(c => `<th>${c.label}</th>`).join('') + '</tr>';
    tbody.innerHTML = rows.map(r =>
      '<tr>' + cols.map(c => {
        const v = r[c.key];
        const cls = c.numeric ? ' class="num"' : '';
        const display = c.fmt ? c.fmt(v) : fmtS(v);
        return `<td${cls}>${display}</td>`;
      }).join('') + '</tr>'
    ).join('');
  }

  // ── Populate selects ──
  async function populateSelect(selectId, query, valKey) {
    const sel  = document.getElementById(selectId);
    const rows = (await conn.query(query)).toArray();
    rows.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r[valKey] ?? '';
      opt.textContent = r[valKey] ?? '';
      sel.appendChild(opt);
    });
  }

  await populateSelect('selTipo',
    `SELECT DISTINCT tipo FROM 'resumo_grupo_a.parquet' WHERE tipo IS NOT NULL ORDER BY tipo`,
    'tipo');
  await populateSelect('selAnoA',
    `SELECT DISTINCT ano FROM 'resumo_grupo_a.parquet' ORDER BY ano`,
    'ano');
  await populateSelect('selAnoB',
    `SELECT DISTINCT ano FROM 'resumo_grupo_b.parquet' ORDER BY ano`,
    'ano');

  // ── GRUPO A ──
  async function refreshA() {
    const tipo = document.getElementById('selTipo').value;
    const ano  = document.getElementById('selAnoA').value;
    const conds = [];
    if (tipo) conds.push(`tipo = '${tipo.replace(/'/g, "''")}'`);
    if (ano)  conds.push(`ano = '${ano}'`);
    const where = conds.length ? 'WHERE ' + conds.join(' AND ') : '';

    const agg = (await conn.query(`
      SELECT
        COALESCE(SUM("Valor Total"), 0)::DOUBLE            AS total,
        COALESCE(SUM("Fornecedores Distintos"), 0)::DOUBLE AS forn,
        COUNT(DISTINCT tipo)::DOUBLE                       AS tipos
      FROM 'resumo_grupo_a.parquet' ${where}
    `)).toArray()[0];

    document.getElementById('cardsA').innerHTML = `
      <div class="card"><div class="card-label">Valor Total</div>
        <div class="card-value accent">${fmt(agg.total)}</div></div>
      <div class="card"><div class="card-label">Fornecedores Distintos</div>
        <div class="card-value green">${fmtN(agg.forn)}</div></div>
      <div class="card"><div class="card-label">Tipos</div>
        <div class="card-value purple">${fmtN(agg.tipos)}</div></div>
    `;

    const rows = (await conn.query(`
      SELECT tipo, ano, "Valor Total", "Fornecedores Distintos"
      FROM 'resumo_grupo_a.parquet' ${where}
      ORDER BY ano DESC, "Valor Total" DESC
    `)).toArray();

    buildTable(document.getElementById('tblA'), rows, [
      { key: 'tipo',                   label: 'Tipo' },
      { key: 'ano',                    label: 'Ano' },
      { key: 'Valor Total',            label: 'Valor Total',  numeric: true, fmt },
      { key: 'Fornecedores Distintos', label: 'Fornecedores', numeric: true, fmt: fmtN },
    ]);
  }

  document.getElementById('selTipo').addEventListener('change', refreshA);
  document.getElementById('selAnoA').addEventListener('change', refreshA);

  // ── GRUPO B ──
  async function refreshB() {
    const ano = document.getElementById('selAnoB').value;
    const where = ano ? `WHERE ano = '${ano}'` : '';

    const agg = (await conn.query(`
      SELECT
        COALESCE(SUM(valor_total_adquirido), 0)::DOUBLE  AS total,
        COALESCE(SUM(fornecedores_distintos), 0)::DOUBLE AS forn,
        COUNT(DISTINCT grupo_b)::DOUBLE                  AS grupos
      FROM 'resumo_grupo_b.parquet' ${where}
    `)).toArray()[0];

    document.getElementById('cardsB').innerHTML = `
      <div class="card"><div class="card-label">Valor Total</div>
        <div class="card-value accent">${fmt(agg.total)}</div></div>
      <div class="card"><div class="card-label">Fornecedores Distintos</div>
        <div class="card-value green">${fmtN(agg.forn)}</div></div>
      <div class="card"><div class="card-label">Palavras-chave</div>
        <div class="card-value purple">${fmtN(agg.grupos)}</div></div>
    `;

    const rows = (await conn.query(`
      SELECT ano, abreviacao, grupo_b, valor_total_adquirido, fornecedores_distintos
      FROM 'resumo_grupo_b.parquet' ${where}
      ORDER BY ano DESC, valor_total_adquirido DESC
    `)).toArray();

    buildTable(document.getElementById('tblB'), rows, [
      { key: 'ano',                    label: 'Ano' },
      { key: 'abreviacao',             label: 'Abreviação' },
      { key: 'grupo_b',                label: 'Palavra-chave' },
      { key: 'valor_total_adquirido',  label: 'Valor Total',  numeric: true, fmt },
      { key: 'fornecedores_distintos', label: 'Fornecedores', numeric: true, fmt: fmtN },
    ]);
  }

  document.getElementById('selAnoB').addEventListener('change', refreshB);

  // ── Group tab switching ──
  document.querySelectorAll('.group-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.group-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.group-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.group).classList.add('active');
    });
  });

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  await refreshA();
  await refreshB();
})();
</script>
</body>
</html>
