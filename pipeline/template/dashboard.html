<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITULO__</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:      #1351B4;
    --blue-dark: #071D41;
    --blue-mid:  #0C326F;
    --green:     #168821;
    --yellow:    #FFCD07;
    --yellow-dk: #A07800;
    --gray-bg:   #F0F2F5;
    --gray-10:   #E6E8EC;
    --gray-20:   #C8CDD6;
    --gray-50:   #8A9099;
    --gray-70:   #4A5057;
    --gray-90:   #1A1D21;
    --white:     #FFFFFF;
    --font: 'Raleway', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--gray-bg);
    color: var(--gray-90);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .panel-header {
    background: var(--blue-dark);
    padding: 0 2.5rem;
    display: flex;
    align-items: stretch;
    min-height: 72px;
  }

  .tricolor {
    width: 8px;
    flex-shrink: 0;
    background: linear-gradient(to bottom,
      var(--yellow) 0%, var(--yellow) 33.3%,
      var(--green)  33.3%, var(--green)  66.6%,
      var(--blue)   66.6%, var(--blue)   100%
    );
    margin: 14px 20px 14px 0;
    border-radius: 2px;
  }

  .panel-header-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 14px 0;
  }

  .panel-orgao {
    font-size: 0.68rem;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .panel-title {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .panel-subtitle {
    font-size: 0.75rem;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-top: 3px;
  }

  .panel-header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .badge {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .accent-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--yellow) 0%, var(--green) 40%, var(--blue) 100%);
  }

  .layout {
    max-width: 1440px;
    margin: 0 auto;
    padding: 1.8rem 2rem 3rem;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.4rem;
    flex-wrap: wrap;
  }

  .toolbar label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--gray-50);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    white-space: nowrap;
  }

  input[type="text"] {
    background: var(--white);
    color: var(--gray-90);
    border: 1px solid var(--gray-20);
    padding: 0.45rem 0.9rem;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 500;
    min-width: 320px;
  }

  input[type="text"]:focus {
    outline: 2px solid var(--blue);
    outline-offset: 1px;
    border-color: var(--blue);
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.4rem;
  }

  .card {
    background: var(--white);
    border-radius: 6px;
    padding: 1.1rem 1.3rem 1.2rem;
    border-left: 4px solid var(--blue);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .card.green  { border-left-color: var(--green); }
  .card.yellow { border-left-color: var(--yellow); }
  .card.slate  { border-left-color: var(--blue-mid); }

  .card-label {
    font-size: 0.67rem;
    font-weight: 700;
    color: var(--gray-50);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .card-value {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--blue-dark);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .card.green  .card-value { color: var(--green); }
  .card.yellow .card-value { color: var(--yellow-dk); }
  .card.slate  .card-value { color: var(--blue-mid); }

  .panel {
    background: var(--white);
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    overflow: hidden;
    border: 1px solid var(--gray-10);
  }

  .panel-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 1.2rem;
    border-bottom: 1px solid var(--gray-10);
  }

  .panel-bar-title {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--gray-50);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .pager {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    color: var(--gray-50);
  }

  .btn {
    font-family: var(--font);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--blue);
    background: none;
    border: 1px solid var(--blue);
    border-radius: 4px;
    padding: 0.3rem 0.8rem;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }

  .btn:hover { background: var(--blue); color: var(--white); }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn:disabled:hover { background: none; color: var(--blue); }

  .table-wrap {
    max-height: 65vh;
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    table-layout: auto;
  }

  thead th {
    background: #EEF2FA;
    color: var(--blue-mid);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.64rem;
    letter-spacing: 0.07em;
    padding: 0.65rem 0.9rem;
    text-align: left;
    border-bottom: 2px solid #C5D4F0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  thead th:hover { background: #DDE6F7; color: var(--blue); }
  thead th.sorted { color: var(--blue); background: #DDE6F7; }

  tbody td {
    padding: 0.5rem 0.9rem;
    border-bottom: 1px solid var(--gray-10);
    vertical-align: top;
    color: var(--gray-90);
  }

  tbody tr:hover { background: #F5F8FF; }
  tbody tr:last-child td { border-bottom: none; }

  .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="panel-header">
  <div class="tricolor"></div>
  <div class="panel-header-text">
    <div class="panel-orgao">__ORGAO__</div>
    <div class="panel-title">__TITULO__</div>
    <div class="panel-subtitle">__SUBTITULO__</div>
  </div>
  <div class="panel-header-right">
    <span class="badge">__BADGE1__</span>
    <span class="badge">__BADGE2__</span>
  </div>
</div>
<div class="accent-bar"></div>

<div class="layout">

  <div class="toolbar">
    <label for="busca">Buscar:</label>
    <input type="text" id="busca" placeholder="Filtre por qualquer coluna de texto…">
  </div>

  <div class="cards" id="cards"></div>

  <div class="panel">
    <div class="panel-bar">
      <span class="panel-bar-title" id="labelTabela">Itens</span>
      <div class="pager">
        <span id="pagerInfo"></span>
        <button class="btn" id="btnPrev">‹ Anterior</button>
        <button class="btn" id="btnNext">Próximo ›</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="tbl"><thead></thead><tbody></tbody></table>
    </div>
  </div>

</div>

<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/+esm';

// ── configuração injetada pelo Python ──────────────────────────────────────
const PARQUET_DATA = __PARQUET_DATA_JS__;
const COLUNAS_MONETARIAS = __COLUNAS_MONETARIAS_JS__;
const COLUNAS_NUMERICAS  = __COLUNAS_NUMERICAS_JS__;
const TABELA_PRINCIPAL   = '__TABELA_PRINCIPAL__';
const PAGE_SIZE = 500;
// ──────────────────────────────────────────────────────────────────────────

const fmt  = v => v == null ? '—' : Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
const fmtN = v => v == null ? '—' : Number(v).toLocaleString('pt-BR');

function base64ToUint8Array(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

(async () => {
  const bundle = await duckdb.selectBundle(duckdb.getJsDelivrBundles());
  const workerUrl = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
  );
  const db = new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(), new Worker(workerUrl));
  await db.instantiate(bundle.mainModule);
  URL.revokeObjectURL(workerUrl);
  const conn = await db.connect();

  for (const [name, b64] of Object.entries(PARQUET_DATA)) {
    await db.registerFileBuffer(name, base64ToUint8Array(b64));
  }

  // ── cards de sumário ───────────────────────────────────────────────────
  const summary = (await conn.query(`
    SELECT COUNT(*) AS total_linhas,
           COUNT(DISTINCT COALESCE(CAST(cnpj_emitente AS VARCHAR), cpf_emitente)) AS emitentes
    FROM '${TABELA_PRINCIPAL}'
  `)).toArray()[0];

  const valorRow = COLUNAS_MONETARIAS.length > 0
    ? (await conn.query(`SELECT SUM(${COLUNAS_MONETARIAS[0]}) AS soma FROM '${TABELA_PRINCIPAL}'`)).toArray()[0]
    : null;

  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="card-label">Total de Linhas</div>
      <div class="card-value">${fmtN(summary.total_linhas)}</div>
    </div>
    <div class="card green">
      <div class="card-label">Emitentes Distintos</div>
      <div class="card-value">${fmtN(summary.emitentes)}</div>
    </div>
    ${valorRow ? `
    <div class="card slate">
      <div class="card-label">${COLUNAS_MONETARIAS[0]}</div>
      <div class="card-value">${fmt(valorRow.soma)}</div>
    </div>` : ''}
  `;

  // ── detecção de colunas ────────────────────────────────────────────────
  const schema = (await conn.query(`DESCRIBE SELECT * FROM '${TABELA_PRINCIPAL}' LIMIT 0`)).toArray();
  const colunas = schema.map(r => ({
    key:     r.column_name,
    label:   r.column_name,
    numeric: COLUNAS_MONETARIAS.includes(r.column_name) || COLUNAS_NUMERICAS.includes(r.column_name),
    fmt:     COLUNAS_MONETARIAS.includes(r.column_name) ? fmt
           : COLUNAS_NUMERICAS.includes(r.column_name)  ? fmtN
           : null,
  }));

  // ── tabela paginada com busca e ordenação ──────────────────────────────
  let allRows = [];
  let filteredRows = [];
  let sortIdx = null;
  let sortAsc = true;
  let page = 0;

  const tbl     = document.getElementById('tbl');
  const busca   = document.getElementById('busca');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const pagerInfo = document.getElementById('pagerInfo');
  const labelTabela = document.getElementById('labelTabela');

  allRows = (await conn.query(`SELECT * FROM '${TABELA_PRINCIPAL}'`)).toArray();
  labelTabela.textContent = `${TABELA_PRINCIPAL.replace('.parquet','')} — ${fmtN(allRows.length)} linhas`;
  filteredRows = allRows;

  function renderHead() {
    tbl.querySelector('thead').innerHTML = '<tr>' + colunas.map((c, i) => {
      const active = i === sortIdx;
      const arrow  = active ? (sortAsc ? ' ▲' : ' ▼') : '';
      return `<th data-colidx="${i}"${active ? ' class="sorted"' : ''}>${c.label}${arrow}</th>`;
    }).join('') + '</tr>';
    tbl.querySelectorAll('thead th').forEach(th => {
      th.addEventListener('click', () => {
        const i = +th.dataset.colidx;
        sortAsc = sortIdx === i ? !sortAsc : true;
        sortIdx = i;
        const col = colunas[i];
        filteredRows = [...filteredRows].sort((a, b) => {
          const va = a[col.key], vb = b[col.key];
          if (va == null && vb == null) return 0;
          if (va == null) return sortAsc ? 1 : -1;
          if (vb == null) return sortAsc ? -1 : 1;
          if (col.numeric) return sortAsc ? Number(va) - Number(vb) : Number(vb) - Number(va);
          return sortAsc
            ? String(va).localeCompare(String(vb), 'pt-BR')
            : String(vb).localeCompare(String(va), 'pt-BR');
        });
        page = 0;
        renderHead();
        renderBody();
      });
    });
  }

  function renderBody() {
    const start = page * PAGE_SIZE;
    const slice = filteredRows.slice(start, start + PAGE_SIZE);
    tbl.querySelector('tbody').innerHTML = slice.map(r =>
      '<tr>' + colunas.map(c => {
        const v = r[c.key];
        const cls = c.numeric ? ' class="num"' : '';
        const display = c.fmt ? c.fmt(v) : (v ?? '—');
        return `<td${cls}>${display}</td>`;
      }).join('') + '</tr>'
    ).join('');
    const total = filteredRows.length;
    const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    pagerInfo.textContent = `Página ${page + 1} de ${pages} (${fmtN(total)} linhas)`;
    btnPrev.disabled = page === 0;
    btnNext.disabled = page >= pages - 1;
  }

  btnPrev.addEventListener('click', () => { page--; renderHead(); renderBody(); });
  btnNext.addEventListener('click', () => { page++; renderHead(); renderBody(); });

  let debounce;
  busca.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      const q = busca.value.trim().toLowerCase();
      filteredRows = q
        ? allRows.filter(r => colunas.some(c => !c.numeric && String(r[c.key] ?? '').toLowerCase().includes(q)))
        : allRows;
      page = 0;
      sortIdx = null;
      sortAsc = true;
      renderHead();
      renderBody();
    }, 200);
  });

  renderHead();
  renderBody();
})().catch(err => {
  document.body.innerHTML += `<p style="color:red;padding:2rem">Erro: ${err.message}</p>`;
});
</script>
</body>
</html>
