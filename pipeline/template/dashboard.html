<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compras Públicas — EcoAdvance · MGI</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:      #1351B4;
    --blue-dark: #071D41;
    --blue-mid:  #0C326F;
    --green:     #168821;
    --yellow:    #FFCD07;
    --yellow-dk: #A07800;
    --gray-bg:   #F0F2F5;
    --gray-10:   #E6E8EC;
    --gray-20:   #C8CDD6;
    --gray-50:   #8A9099;
    --gray-70:   #4A5057;
    --gray-90:   #1A1D21;
    --white:     #FFFFFF;
    --font: 'Raleway', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--gray-bg);
    color: var(--gray-90);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .panel-header {
    background: var(--blue-dark);
    padding: 0 2.5rem;
    display: flex;
    align-items: stretch;
    min-height: 72px;
  }

  .tricolor {
    width: 8px;
    flex-shrink: 0;
    background: linear-gradient(to bottom,
      var(--yellow) 0%, var(--yellow) 33.3%,
      var(--green)  33.3%, var(--green)  66.6%,
      var(--blue)   66.6%, var(--blue)   100%
    );
    margin: 14px 20px 14px 0;
    border-radius: 2px;
  }

  .panel-header-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 14px 0;
  }

  .panel-orgao {
    font-size: 0.68rem;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .panel-title {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .panel-subtitle {
    font-size: 0.75rem;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-top: 3px;
  }

  .panel-header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .badge {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .accent-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--yellow) 0%, var(--green) 40%, var(--blue) 100%);
  }

  .layout {
    max-width: 1440px;
    margin: 0 auto;
    padding: 1.8rem 2rem 3rem;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.4rem;
    flex-wrap: wrap;
  }

  .toolbar label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--gray-50);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    white-space: nowrap;
  }

  select {
    background: var(--white);
    color: var(--gray-90);
    border: 1px solid var(--gray-20);
    padding: 0.45rem 0.9rem;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 500;
    min-width: 300px;
    cursor: pointer;
  }

  select:focus {
    outline: 2px solid var(--blue);
    outline-offset: 1px;
    border-color: var(--blue);
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.4rem;
  }

  .card {
    background: var(--white);
    border-radius: 6px;
    padding: 1.1rem 1.3rem 1.2rem;
    border-left: 4px solid var(--blue);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .card.green  { border-left-color: var(--green); }
  .card.yellow { border-left-color: var(--yellow); }

  .card-label {
    font-size: 0.67rem;
    font-weight: 700;
    color: var(--gray-50);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .card-value {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--blue-dark);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .card.green  .card-value { color: var(--green); }
  .card.yellow .card-value { color: var(--yellow-dk); }

  .panel {
    background: var(--white);
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    overflow: hidden;
    border: 1px solid var(--gray-10);
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--gray-10);
    background: var(--white);
    overflow-x: auto;
  }

  .tab {
    padding: 0.7rem 1.3rem;
    cursor: pointer;
    color: var(--gray-50);
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
    transition: color 0.12s;
    white-space: nowrap;
  }

  .tab:hover { color: var(--blue); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  .hidden { display: none; }

  .table-wrap {
    max-height: 60vh;
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    table-layout: auto;
  }

  thead th {
    background: #EEF2FA;
    color: var(--blue-mid);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.64rem;
    letter-spacing: 0.07em;
    padding: 0.65rem 0.9rem;
    text-align: left;
    border-bottom: 2px solid #C5D4F0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  thead th:hover { background: #DDE6F7; color: var(--blue); }
  thead th.sorted { color: var(--blue); background: #DDE6F7; }

  tbody td {
    padding: 0.5rem 0.9rem;
    border-bottom: 1px solid var(--gray-10);
    vertical-align: top;
    color: var(--gray-90);
  }

  tbody tr:hover { background: #F5F8FF; }
  tbody tr:last-child td { border-bottom: none; }

  .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    font-weight: 600;
  }

  .chart-toolbar {
    display: flex;
    justify-content: flex-end;
    padding: 0.8rem 1.5rem 0;
  }

  .btn-toggle-all {
    font-family: var(--font);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--blue);
    background: none;
    border: 1px solid var(--blue);
    border-radius: 4px;
    padding: 0.35rem 0.9rem;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }

  .btn-toggle-all:hover {
    background: var(--blue);
    color: var(--white);
  }

  .chart-wrap {
    height: 620px;
    position: relative;
    padding: 1.5rem;
  }
</style>
</head>
<body>

<div class="panel-header">
  <div class="tricolor"></div>
  <div class="panel-header-text">
    <div class="panel-orgao">MGI · Ministério da Gestão e da Inovação em Serviços Públicos</div>
    <div class="panel-title">Compras Públicas — EcoAdvance</div>
    <div class="panel-subtitle">Notas Fiscais Eletrônicas do Executivo Federal · 2022–2025</div>
  </div>
  <div class="panel-header-right">
    <span class="badge">Portal da Transparência · CGU</span>
    <span class="badge">EcoAdvance</span>
  </div>
</div>
<div class="accent-bar"></div>

<div class="layout">
  <div id="app">

    <div class="toolbar">
      <label for="selPespp">Produto PESPP:</label>
      <select id="selPespp"><option value="">Todos os produtos</option></select>
    </div>

    <div class="cards" id="cards"></div>

    <div class="panel">
      <div class="tabs">
        <div class="tab active" data-tab="pespp">Por Produto PESPP</div>
        <div class="tab" data-tab="tabela">Por Produto PESPP e NCM</div>
        <div class="tab" data-tab="evolucao">Evolução Anual</div>
      </div>

      <div id="tab-pespp">
        <div class="table-wrap"><table id="tblPespp"><thead></thead><tbody></tbody></table></div>
      </div>
      <div id="tab-tabela" class="hidden">
        <div class="table-wrap"><table id="tblEcoAdvance"><thead></thead><tbody></tbody></table></div>
      </div>
      <div id="tab-evolucao" class="hidden">
        <div class="chart-toolbar">
          <button class="btn-toggle-all" id="btnToggleAll">Desmarcar tudo</button>
        </div>
        <div class="chart-wrap"><canvas id="chartEvolucao"></canvas></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/+esm';

(async () => {
  const bundle = await duckdb.selectBundle(duckdb.getJsDelivrBundles());
  const workerUrl = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
  );
  const worker = new Worker(workerUrl);
  const db = new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(), worker);
  await db.instantiate(bundle.mainModule);
  URL.revokeObjectURL(workerUrl);
  const conn = await db.connect();

  async function registerParquet(file) {
    const resp = await fetch(file);
    const buf = new Uint8Array(await resp.arrayBuffer());
    await db.registerFileBuffer(file, buf);
  }

  await registerParquet('resumo_ecoadvance.parquet');
  await registerParquet('resumo_por_pespp.parquet');
  await registerParquet('totais_globais_ecoadvance.parquet');

  const fmt  = v => v == null ? '—' : Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
  const fmtN = v => v == null ? '—' : Number(v).toLocaleString('pt-BR');

  // Popula filtro PRODUTO PESPP
  const produtos = (await conn.query(
    `SELECT DISTINCT "PRODUTO PESPP" AS p FROM 'resumo_ecoadvance.parquet' ORDER BY 1`
  )).toArray();
  const sel = document.getElementById('selPespp');
  produtos.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.p;
    opt.textContent = r.p;
    sel.appendChild(opt);
  });

  function buildTable(tableEl, rows, cols) {
    const thead = tableEl.querySelector('thead');
    const tbody = tableEl.querySelector('tbody');
    let sortIdx = null, sortAsc = true;

    function renderBody(data) {
      tbody.innerHTML = data.map((r, i) =>
        `<tr data-idx="${i}">` +
        cols.map(c => {
          const v = r[c.key];
          const cls = c.numeric ? ' class="num"' : '';
          const display = c.fmt ? c.fmt(v) : (v ?? '—');
          return `<td${cls}>${display}</td>`;
        }).join('') + '</tr>'
      ).join('');
    }

    function renderHead() {
      thead.innerHTML = '<tr>' + cols.map((c, i) => {
        const active = i === sortIdx;
        const arrow  = active ? (sortAsc ? ' ▲' : ' ▼') : '';
        const labelHtml = c.label.replace(/\n/g, '<br>');
        return `<th data-colidx="${i}"${active ? ' class="sorted"' : ''}>${labelHtml}${arrow}</th>`;
      }).join('') + '</tr>';
      thead.querySelectorAll('th').forEach(th => {
        th.addEventListener('click', () => {
          const i = +th.dataset.colidx;
          sortAsc = sortIdx === i ? !sortAsc : true;
          sortIdx = i;
          const col = cols[sortIdx];
          const key = col.key;
          const sorted = [...rows].sort((a, b) => {
            const va = a[key], vb = b[key];
            if (va == null && vb == null) return 0;
            if (va == null) return sortAsc ? 1 : -1;
            if (vb == null) return sortAsc ? -1 : 1;
            if (col.numeric)
              return sortAsc ? Number(va) - Number(vb) : Number(vb) - Number(va);
            return sortAsc
              ? String(va).localeCompare(String(vb), 'pt-BR')
              : String(vb).localeCompare(String(va), 'pt-BR');
          });
          renderHead();
          renderBody(sorted);
        });
      });
    }

    renderHead();
    renderBody(rows);
  }

  const ANOS = ['2022', '2023', '2024', '2025'];
  const PALETTE = [
    '#1351B4','#168821','#A07800','#0C326F','#2E7D32','#8B6914',
    '#2670E8','#388E3C','#C8961A','#1565C0','#43A047','#9E7B1E',
    '#0D47A1','#2E7D32','#6D4C00','#1A237E','#1B5E20','#4E342E',
    '#283593','#33691E'
  ];

  let chartInstance = null;
  let allVisible = true;
  const btnToggleAll = document.getElementById('btnToggleAll');

  function buildChart(rows, groupKey) {
    const ctx = document.getElementById('chartEvolucao').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    allVisible = true;
    btnToggleAll.textContent = 'Desmarcar tudo';

    // Agrega por groupKey, top 20
    const agg = {};
    rows.forEach(r => {
      const k = r[groupKey] ?? '—';
      if (!agg[k]) agg[k] = { label: k, vals: [0, 0, 0, 0], total: 0 };
      ANOS.forEach((a, i) => { agg[k].vals[i] += Number(r[`VALOR ${a}`]) || 0; });
      agg[k].total += ANOS.reduce((s, a) => s + (Number(r[`VALOR ${a}`]) || 0), 0);
    });

    const top = Object.values(agg)
      .sort((a, b) => b.total - a.total)
      .slice(0, 20);

    const datasets = top.map((g, i) => ({
      label: g.label,
      data: g.vals.map(v => v / 1e6),
      borderColor: PALETTE[i % PALETTE.length],
      backgroundColor: PALETTE[i % PALETTE.length] + '18',
      tension: 0.3,
      pointRadius: 4,
      pointHoverRadius: 6,
      borderWidth: 2,
    }));

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels: ANOS, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              color: '#4A5057',
              font: { size: 11, family: "'Raleway',sans-serif", weight: '600' },
              boxWidth: 12,
              padding: 16,
            },
          },
          tooltip: {
            backgroundColor: '#071D41',
            titleColor: '#FFCD07',
            bodyColor: '#FFFFFF',
            padding: 10,
            callbacks: {
              label: c => ` ${c.dataset.label}: R$ ${c.parsed.y.toFixed(1)} M`,
            },
          },
        },
        scales: {
          x: {
            ticks: { color: '#8A9099', font: { family: "'Raleway',sans-serif", weight: '600' } },
            grid: { color: '#E6E8EC' },
          },
          y: {
            ticks: {
              color: '#8A9099',
              font: { family: "'Raleway',sans-serif" },
              callback: v => `R$ ${v.toFixed(0)} M`,
            },
            grid: { color: '#E6E8EC' },
            title: {
              display: true,
              text: 'Valor (R$ milhões)',
              color: '#8A9099',
              font: { family: "'Raleway',sans-serif", size: 11 },
            },
          },
        },
      },
    });
  }

  btnToggleAll.addEventListener('click', () => {
    if (!chartInstance) return;
    allVisible = !allVisible;
    chartInstance.data.datasets.forEach((_, i) => {
      chartInstance.setDatasetVisibility(i, allVisible);
    });
    chartInstance.update();
    btnToggleAll.textContent = allVisible ? 'Desmarcar tudo' : 'Marcar tudo';
  });

  async function refresh() {
    const pespp = sel.value;
    const where = pespp ? `WHERE "PRODUTO PESPP" = '${pespp.replace(/'/g, "''")}'` : '';

    // Cards
    let total, itens;
    if (!pespp) {
      const g = (await conn.query(`
        SELECT "VALOR TOTAL 2025"::DOUBLE AS total,
               "ITENS 2025"::DOUBLE AS itens
        FROM 'totais_globais_ecoadvance.parquet'
      `)).toArray()[0];
      total = g.total; itens = g.itens;
    } else {
      const s = (await conn.query(`
        SELECT COALESCE(SUM("VALOR 2025"),0)::DOUBLE AS total
        FROM 'resumo_ecoadvance.parquet' ${where}
      `)).toArray()[0];
      total = s.total; itens = null;
    }

    document.getElementById('cards').innerHTML = `
      <div class="card">
        <div class="card-label">Valor Total (2025)</div>
        <div class="card-value">${fmt(total)}</div>
      </div>
      ${itens != null ? `
      <div class="card yellow">
        <div class="card-label">Itens de NF-e (2025) </div>
        <div class="card-value">${fmtN(itens)}</div>
      </div>` : ''}
    `;

    // Tabela Por NCM e Produto PESPP
    const rows = (await conn.query(
      `SELECT * FROM 'resumo_ecoadvance.parquet' ${where} ORDER BY ("VALOR 2022"+"VALOR 2023"+"VALOR 2024"+"VALOR 2025") DESC`
    )).toArray();

    buildTable(document.getElementById('tblEcoAdvance'), rows, [
      { key: 'PRODUTO PESPP',     label: 'Produto PESPP' },
      { key: 'PE',                label: 'PE' },
      { key: 'CODIGO',            label: 'Código NCM' },
      { key: 'DESCRIÇÃO',         label: 'Descrição' },
      { key: 'FORNECEDORES 2022', label: 'Fornecedores\n2022',   numeric: true, fmt: fmtN },
      { key: 'FORNECEDORES 2023', label: 'Fornecedores\n2023',   numeric: true, fmt: fmtN },
      { key: 'FORNECEDORES 2024', label: 'Fornecedores\n2024',   numeric: true, fmt: fmtN },
      { key: 'FORNECEDORES 2025', label: 'Fornecedores\n2025',   numeric: true, fmt: fmtN },
      { key: 'VALOR 2022',        label: 'Valor\n2022',    numeric: true, fmt },
      { key: 'VALOR 2023',        label: 'Valor\n2023',    numeric: true, fmt },
      { key: 'VALOR 2024',        label: 'Valor\n2024',    numeric: true, fmt },
      { key: 'VALOR 2025',        label: 'Valor\n2025',    numeric: true, fmt },
    ]);

    // Tabela Por Produto PESPP
    const pesppRows = (await conn.query(
      `SELECT * FROM 'resumo_por_pespp.parquet' ${where} ORDER BY ("VALOR 2022"+"VALOR 2023"+"VALOR 2024"+"VALOR 2025") DESC`
    )).toArray();

    buildTable(document.getElementById('tblPespp'), pesppRows, [
      { key: 'PRODUTO PESPP',     label: 'Produto PESPP' },
      { key: 'FORNECEDORES 2022', label: 'Fornecedores\n2022',  numeric: true, fmt: fmtN },
      { key: 'FORNECEDORES 2023', label: 'Fornecedores\n2023',  numeric: true, fmt: fmtN },
      { key: 'FORNECEDORES 2024', label: 'Fornecedores\n2024',  numeric: true, fmt: fmtN },
      { key: 'FORNECEDORES 2025', label: 'Fornecedores\n2025',  numeric: true, fmt: fmtN },
      { key: 'VALOR 2022',        label: 'Valor\n2022',    numeric: true, fmt },
      { key: 'VALOR 2023',        label: 'Valor\n2023',    numeric: true, fmt },
      { key: 'VALOR 2024',        label: 'Valor\n2024',    numeric: true, fmt },
      { key: 'VALOR 2025',        label: 'Valor\n2025',    numeric: true, fmt },
    ]);

    // Gráfico sempre por PRODUTO PESPP
    buildChart(pesppRows, 'PRODUTO PESPP');
  }

  sel.addEventListener('change', refresh);

  // Tabs
  const tabIds = { pespp: 'tab-pespp', tabela: 'tab-tabela', evolucao: 'tab-evolucao' };
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      Object.entries(tabIds).forEach(([key, id]) => {
        document.getElementById(id).classList.toggle('hidden', tab.dataset.tab !== key);
      });
    });
  });

  await refresh();
})().catch(err => {
  document.body.innerHTML += `<p style="color:#C53030;padding:2rem">Erro ao carregar: ${err.message}</p>`;
});
</script>
</body>
</html>
